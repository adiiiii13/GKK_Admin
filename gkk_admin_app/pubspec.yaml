name: gkk_admin_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.1+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # --- ADDED DEPENDENCIES ---
  # For local storage (Login state, User verification status)
  shared_preferences: ^2.3.2
  
  # For custom typography (Poppins)
  google_fonts: ^6.1.0

  # Default icons
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1

  # For FCM Push Notification Service
  http: ^1.6.0
  googleapis_auth: ^2.0.0

  # For Profile Picture
  image_picker: ^1.0.7
  image_cropper: ^8.1.0

  # For Supabase Auth & Database
  supabase_flutter: ^2.3.0
  google_sign_in: ^6.1.0
  crypto: ^3.0.3
  flutter_dotenv: ^5.1.0

  # For device info (model, OS version)
  device_info_plus: ^11.3.3
  local_auth: ^2.3.0
  package_info_plus: ^8.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  # For generating app icons
  flutter_launcher_icons: ^0.14.2

  # For splash screen
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2da832"  # GKK green color
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#2da832"
  image: "assets/images/app_icon.png"
  android_12:
    image: "assets/images/app_icon.png"
    icon_background_color: "#2da832"